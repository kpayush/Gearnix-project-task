<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login UI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f6f8;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-card {
            width: 380px;
            background: #fff;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .brand {
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
        }

        .btn-purple {
            background: linear-gradient(90deg, #5f2eea, #7a5af8);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 500;
        }

        .btn-purple:hover {
            opacity: 0.9;
        }

        .btn-blue {
            background: #1663d6;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 500;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 15px 0;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #ddd;
        }

        .divider span {
            margin: 0 10px;
            color: #888;
            font-size: 14px;
        }

        .footer-text {
            font-size: 12px;
            color: #888;
            text-align: center;
            margin-top: 15px;
        }

        .footer-text a {
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="d-flex justify-content-center align-items-center vh-100">

    <div class="login-card">

        <div class="brand">Nov Gearnix</div>

        <h5 class="mb-1">Sign in</h5>
        <p class="text-muted small mb-3">Sign in or create an account</p>

        <button class="btn btn-purple w-100 mb-3">
            Continue with shop
        </button>

        <div class="divider">
            <span>or</span>
        </div>

        <input type="email" id="email" class="form-control mb-3" placeholder="Email">

        <button class="btn btn-blue w-100" onclick="handleLogin()">
            Continue
        </button>

        <div class="form-check mt-3">
            <input class="form-check-input" type="checkbox" id="news">
            <label class="form-check-label small">
                Email me with news and offers
            </label>
        </div>

        <div class="footer-text">
            By continuing, you agree to our <a href="tearm-Service.html">Terms of service</a>
        </div>

    </div>

</div>

<script>
    function handleLogin() {
        const email = document.getElementById("email").value;

        if (!email) {
            alert("Enter email first");
            return;
        }

        if (!email.includes("@")) {
            alert("Invalid email");
            return;
        }

        alert("Login flow triggered for: " + email);
    }
</script>

</body>
</html>
