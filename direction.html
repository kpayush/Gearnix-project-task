<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/header.css">
</head>

<body>
    <style>
body {
    background: #f7f7f7;
    font-family: Segoe UI;
}
/* Body aur Main Container ko screen ke andar rakhne ke liye */
html, body {
    overflow-x: hidden; /* Horizontal scroll puri tarah band karne ke liye */
    width: 100%;
    margin: 0;
    padding: 0;
}

.container, .container-fluid {
    padding-right: 15px;
    padding-left: 15px;
    width: 100%;
}

.row {
    margin-right: 0;
    margin-left: 0;
}
/* HEADER */

.page-header {
    padding: 80px 0;
    background: #ffffff;
    text-align: center;
}

.page-header h2 {
    font-weight: 700;
    letter-spacing: 2px;
}

.breadcrumb-text {
    color: #888;
}


/* MAP SECTION */

.map-section {
    width: 100%;
    margin-top: 40px;
}

.map-box {
    position: relative;
    width: 100%;
    border-radius: 15px;
    overflow: hidden;
}

.map-box iframe {
    width: 100%;
    height: 600px;
    border: 0;
    display: block;
}


/* CONTACT CARD */

.map-info {
    position: absolute;
    top: 120px;
    left: 120px;
    width: 350px;
    background: #000;
    color: #fff;
    padding: 35px;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.map-info p {
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 15px;
}


/* SOCIAL ICONS */

.social-icons {
    margin-top: 20px;
}

.social-icons i {
    background: #fff;
    color: #000;
    width: 35px;
    height: 35px;
    line-height: 35px;
    text-align: center;
    border-radius: 50%;
    margin-right: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.social-icons i:hover {
    background: #ff4d6d;
    color: #fff;
}
    </style>

    <div id="header"></div>

    <section class="page-header">
        <div class="container">

            <h2>Page Store Direction</h2>
            <p class="breadcrumb-text">Home → Page Store Direction</p>

        </div>
    </section>


    <!-- MAP -->

    <section class="map-section">
        <div class="row">

            <div class="col-lg-12">

                <div class="map-box">

                   <iframe src="https://maps.google.com/maps?q=toronto&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
                    <div class="map-info">

                        <p><strong>Address:</strong> 123 Suspendis matti, Visaosang <br>
                            Building VST District, NY Accums, North American</p>

                        <p><strong>Email:</strong> support@domain.com</p>

                        <p><strong>Call Us:</strong> (012)-345-67890</p>

                        <p><strong>Opening time:</strong> Our store has re-opened for shopping, exchanges every day 11am
                            to 7pm</p>

                        <div class="social-icons">
                            <i class="fab fa-facebook-f"></i>
                            <i class="fab fa-instagram"></i>
                            <i class="fab fa-x-twitter"></i>
                            <i class="fab fa-tiktok"></i>
                        </div>

                    </div>

                </div>

            </div>

        </div>
    </section>


<div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="layout.js"></script>
</body>

</html>
